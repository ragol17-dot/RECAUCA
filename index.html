<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulador RECAUCA IV</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial, sans-serif;
  max-width: 900px;
  margin:auto;
  padding:20px;
  background:#f4f4f9;
}
h2{text-align:center;color:#003366;}

#timer{
  font-size:20px;
  font-weight:bold;
  color:#b71c1c;
  text-align:right;
  margin-bottom:10px;
}

.barra{
  height:20px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
  margin:15px 0;
}
.barra-inner{
  height:100%;
  background:#4CAF50;
  width:0%;
}

/* CUADRO FIJO */
.pregunta{
  background:#fff;
  padding:20px;
  border-radius:10px;
  box-shadow:0 3px 6px rgba(0,0,0,.1);
  min-height:360px;
}

.opcion{
  display:block;
  margin:10px 0;
  padding:10px;
  background:#eef1f5;
  border-radius:6px;
  cursor:pointer;
}

.correcta{background:#c8f7c5;border:2px solid #2e7d32;}
.incorrecta{background:#f8c9c9;border:2px solid #c62828;}

.boton{
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:#007ACC;
  color:#fff;
  cursor:pointer;
}
.boton:hover{background:#005A99;}

#explicacion{
  display:none;
  margin-top:15px;
  padding:12px;
  background:#e6f4ea;
  border-radius:8px;
  font-weight:bold;
}

/* CONTROLES */
.control{
  margin-top:15px;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:10px;
}
.control-botones{
  display:flex;
  gap:12px;
  margin-bottom:20px;
}
.control-indicadores{
  font-weight:bold;
}
</style>
</head>

<body>

<h2>Simulador RECAUCA IV</h2>

<!-- SELECCIÓN -->
<div id="seleccion">
  <select id="tituloSelect">
    <option value="">-- Seleccione un título --</option>
    <option value="__TODOS__">📘 TODOS LOS TÍTULOS</option>
  </select>
  <br><br>
  <button class="boton" onclick="iniciar('prueba')">Modo Prueba</button>
  <button class="boton" onclick="iniciar('examen')">Modo Examen</button>
</div>

<!-- SIMULADOR -->
<div id="simulador" style="display:none;">

  <div id="timer">⏱ 0:00</div>

  Pregunta <span id="indicePregunta"></span> /
  <span id="totalPreguntas"></span>

  <div class="barra">
    <div class="barra-inner" id="barra"></div>
  </div>

  <div class="pregunta">
    <div id="preguntaTexto"></div>
    <div id="opciones"></div>
    
    <div class="control-botones">
      <button class="boton" onclick="anterior()">⬅ Anterior</button>
      <button class="boton" onclick="siguiente()">Siguiente ➡</button>
    </div>
    
    <div id="explicacion"></div>
  </div>

  <div class="control">
    <div class="control-indicadores">
      ✔️ <span id="correctas">0</span> |
      ❌ <span id="incorrectas">0</span>
    </div>
  </div>

</div>

<!-- BASE -->
<script src="base.js"></script>

<!-- LÓGICA -->
<script>
let banco=[],indice=0,respuestas=[],correctas=0,incorrectas=0;
let opcionesMezcladas={}, correctasMezcladas={};
let tiempoTotal=0, intervalo=null;

function cargarTitulos(){
  const sel=document.getElementById("tituloSelect");
  [...new Set(bancoCompleto.map(p=>p.titulo))]
    .forEach(t=>sel.appendChild(new Option(t,t)));
}

function iniciar(modo){
  const t = tituloSelect.value;

  if(!t){
    alert("Seleccione un título");
    return;
  }

  /* 🔒 REGLA DEL EXAMEN */
  if(modo === "examen" && t !== "__TODOS__"){
    alert("⚠️ En modo EXAMEN debe seleccionar TODOS los títulos");
    return;
  }

  banco = t==="__TODOS__"
    ? bancoCompleto
    : bancoCompleto.filter(p=>p.titulo===t);

  /* 🎲 EXAMEN = seleccionar 200 preguntas aleatorias */
  if(modo === "examen"){
    banco = [...banco].sort(()=>Math.random()-0.5).slice(0,200);
  }

  if(!banco.length){
    alert("No hay preguntas");
    return;
  }

  indice=0;
  respuestas=Array(banco.length).fill(null);
  correctas=incorrectas=0;
  opcionesMezcladas={}; correctasMezcladas={};

  tiempoTotal = banco.length * 20;
  iniciarCronometro();

  seleccion.style.display="none";
  simulador.style.display="block";
  totalPreguntas.innerText=banco.length;

  mostrar(0);
}

function mezclar(opciones, correcta){
  const arr=opciones.map((t,i)=>({t,i})).sort(()=>Math.random()-0.5);
  return {o:arr.map(x=>x.t), c:arr.findIndex(x=>x.i===correcta)};
}

function mostrar(i){
  indice=i;
  const p=banco[i];

  if(!opcionesMezcladas[i]){
    const m=mezclar(p.opciones,p.correcta);
    opcionesMezcladas[i]=m.o;
    correctasMezcladas[i]=m.c;
  }

  indicePregunta.innerText=i+1;
  preguntaTexto.innerHTML=`<b>${p.titulo}</b><br>${p.pregunta}`;

  opciones.innerHTML=opcionesMezcladas[i].map((o,x)=>{
    let c="";
    if(respuestas[i]!=null){
      if(x===correctasMezcladas[i]) c="correcta";
      else if(x===respuestas[i]) c="incorrecta";
    }
    return `<label class="opcion ${c}">
      <input type="radio" ${respuestas[i]!=null?"disabled":""}
      onclick="responder(${x})"> ${o}
    </label>`;
  }).join("");

  explicacion.style.display=respuestas[i]!=null?"block":"none";
  explicacion.innerHTML=respuestas[i]!=null
    ? "📚 Base legal: "+p.explicacion
    : "";

  barra.style.width=((i+1)/banco.length*100)+"%";
}

function responder(x){
  if(respuestas[indice]!=null) return;
  respuestas[indice]=x;
  x===correctasMezcladas[indice]?correctas++:incorrectas++;
  document.getElementById("correctas").innerText=correctas;
  document.getElementById("incorrectas").innerText=incorrectas;
  mostrar(indice);
}

function iniciarCronometro(){
  clearInterval(intervalo);
  intervalo=setInterval(()=>{
    tiempoTotal--;
    const m=Math.floor(tiempoTotal/60);
    const s=tiempoTotal%60;
    timer.innerText=`⏱ ${m}:${String(s).padStart(2,"0")}`;
    if(tiempoTotal<=0) clearInterval(intervalo);
  },1000);
}

function siguiente(){ if(indice<banco.length-1) mostrar(indice+1); }
function anterior(){ if(indice>0) mostrar(indice-1); }

window.addEventListener("load",cargarTitulos);
</script>

</body>
</html>
